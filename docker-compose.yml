services:

  postgres:
    image: postgres:16-alpine
    container_name: ibibina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ryan
      POSTGRES_DB: ibibina_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ibibina_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ibibina-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "5100:5100"
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: